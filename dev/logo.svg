<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#1a1a2e"/>

  <!-- Primary terminal lines -->
  <line x1="7" y1="14" x2="22" y2="14" stroke="#4063D8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="7" y1="50" x2="22" y2="50" stroke="#4063D8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Primary winding — 3 loops arching left — Julia blue -->
  <path d="M 22 14 A 6 6 0 0 0 22 26 A 6 6 0 0 0 22 38 A 6 6 0 0 0 22 50"
        fill="none" stroke="#4063D8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Magnetic core — left bar Julia red, right bar Julia purple -->
  <line x1="28" y1="11" x2="28" y2="53" stroke="#CB3C33" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="11" x2="36" y2="53" stroke="#9558B2" stroke-width="3" stroke-linecap="round"/>

  <!-- Secondary winding — 3 loops arching right — Julia green -->
  <path d="M 42 14 A 6 6 0 0 1 42 26 A 6 6 0 0 1 42 38 A 6 6 0 0 1 42 50"
        fill="none" stroke="#389826" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Secondary terminal lines -->
  <line x1="42" y1="14" x2="57" y2="14" stroke="#389826" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="50" x2="57" y2="50" stroke="#389826" stroke-width="2.5" stroke-linecap="round"/>
</svg>
